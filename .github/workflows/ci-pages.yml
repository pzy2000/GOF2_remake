name: CI and GitHub Pages

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Test and build on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

  pages-build:
    name: Build and smoke test GitHub Pages artifact
    if: github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /GOF2_remake/
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build

      - name: Smoke test static preview
        run: |
          npx vite preview --host 127.0.0.1 --port 4173 --strictPort &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true' EXIT
          base_path="${VITE_BASE_PATH:-/GOF2_remake/}"
          for attempt in {1..30}; do
            if curl --fail --silent --show-error "http://127.0.0.1:4173${base_path}" > /tmp/gof2-preview.html; then
              grep -q '<div id="root"></div>' /tmp/gof2-preview.html
              asset_path="$(grep -o "${base_path}assets/[^\"']*\.js" /tmp/gof2-preview.html | head -n 1)"
              test -n "$asset_path"
              curl --fail --silent --show-error -D /tmp/gof2-preview.headers "http://127.0.0.1:4173${asset_path}" -o /tmp/gof2-preview.js
              grep -qi 'content-type:.*javascript' /tmp/gof2-preview.headers
              ! grep -qi '<!doctype html' /tmp/gof2-preview.js
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for Vite preview." >&2
          exit 1

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: pages-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
